<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>⛅ Async Weather Tracker</h2>
    </header>

    <main class="container">
        <section class="left-column">
            <div class="card">
                <label for="cityInput"><strong>Search City</strong></label>
                <div class="input-group">
                    <input type="text" id="cityInput" placeholder="Enter city name...">
                    <button id="searchBtn">Search</button>
                </div>
            </div>

            <div class="card">
                <strong>Search History</strong>
                <ul id="historyList"></ul>
            </div>
        </section>

        <section class="right-column">
            <div class="card weather-card">
                <strong>Weather Info</strong>
                <div id="weatherDisplay">
                    <p>Enter a city to view weather details.</p>
                </div>
            </div>
        </section>
    </main>

    <section class="console-container">
        <div class="card console-card">
            <strong>Console - Event Loop</strong>
            <div id="customConsole"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
